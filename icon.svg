<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1a35"/>
      <stop offset="100%" stop-color="#080c17"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#c47d00"/>
    </linearGradient>
    <linearGradient id="trophyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ball" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round"><rect width="512" height="512" rx="108" ry="108"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Glow radial -->
  <ellipse cx="256" cy="220" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Linha decorativa ciano superior -->
  <rect x="60" y="72" width="392" height="2" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="120" y="72" width="272" height="2" rx="1" fill="#00d4ff" opacity="0.6"/>

  <!-- TROFÉU -->
  <!-- Corpo principal -->
  <path d="M176 130 Q176 260 256 290 Q336 260 336 130 Z" fill="url(#trophy)" filter="url(#shadow)"/>
  <!-- Shine no troféu -->
  <path d="M196 135 Q196 245 256 272 Q230 245 230 135 Z" fill="url(#trophyShine)"/>
  
  <!-- Alças laterais -->
  <path d="M176 145 Q130 145 130 195 Q130 235 176 235" fill="none" stroke="url(#trophy)" stroke-width="18" stroke-linecap="round"/>
  <path d="M336 145 Q382 145 382 195 Q382 235 336 235" fill="none" stroke="url(#trophy)" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Alças internas (detalhe) -->
  <path d="M176 160 Q148 160 148 195 Q148 222 176 225" fill="none" stroke="#c47d00" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M336 160 Q364 160 364 195 Q364 222 336 225" fill="none" stroke="#c47d00" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Base do troféu -->
  <rect x="220" y="290" width="72" height="16" rx="4" fill="url(#trophy)"/>
  <rect x="196" y="306" width="120" height="20" rx="6" fill="url(#trophy)"/>
  <rect x="182" y="326" width="148" height="14" rx="4" fill="#c47d00"/>

  <!-- Detalhes no corpo do troféu -->
  <path d="M216 175 Q256 195 296 175" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
  
  <!-- BOLA DE FUTEBOL (pequena, dentro do troféu) -->
  <circle cx="256" cy="210" r="34" fill="url(#ball)" filter="url(#shadow)"/>
  <!-- Detalhes da bola -->
  <path d="M256 176 L264 190 L256 196 L248 190 Z" fill="#222" opacity="0.8"/>
  <path d="M222 200 L234 194 L240 204 L234 218 L222 212 Z" fill="#222" opacity="0.8"/>
  <path d="M290 200 L278 194 L272 204 L278 218 L290 212 Z" fill="#222" opacity="0.8"/>
  <path d="M234 228 L240 216 L256 218 L272 216 L278 228 L256 238 Z" fill="#222" opacity="0.8"/>
  <!-- Brilho da bola -->
  <ellipse cx="244" cy="198" rx="10" ry="7" fill="white" opacity="0.5" transform="rotate(-20 244 198)"/>

  <!-- Estrelas decorativas -->
  <text x="112" y="178" font-size="20" fill="#f5a623" opacity="0.8">★</text>
  <text x="374" y="178" font-size="20" fill="#f5a623" opacity="0.8">★</text>
  <text x="244" y="120" font-size="14" fill="#00d4ff" opacity="0.6">★</text>
  <text x="268" y="120" font-size="14" fill="#00d4ff" opacity="0.6">★</text>

  <!-- Texto BOLÃO -->
  <text x="256" y="376" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#00d4ff" text-anchor="middle" letter-spacing="3">BOLÃO</text>
  <!-- Texto COPA 2026 -->
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#f5a623" text-anchor="middle" letter-spacing="2">COPA 2026</text>

  <!-- Linha decorativa inferior -->
  <rect x="96" y="428" width="320" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>
  
  <!-- Dots decorativos -->
  <circle cx="96" cy="429" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="416" cy="429" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="256" cy="429" r="3" fill="#f5a623" opacity="0.8"/>

  <!-- Borda premium -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.15"/>
  <rect x="6" y="6" width="500" height="500" rx="102" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.08"/>
</svg>